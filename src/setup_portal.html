<!doctype html>
<html lang="en">
  <head>
    <!--
      OpenCurtainLab Wi-Fi setup portal.
      This readable source file is cleaned and gzip-compressed into SetupPortalHtml.h
      by tools/release.py.
    -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCurtainLab Setup</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 14px;
        background: #0c0e0d;
        color: #f0f4f0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }

      .card {
        max-width: 440px;
        margin: 10px auto;
        padding: 16px;
        background: #131613;
        border: 1px solid #2c312c;
        border-radius: 12px;
      }

      .logo {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      svg {
        width: 42px;
        height: 42px;
        color: #f5b030;
      }

      .brand {
        font-weight: 800;
        font-size: 17px;
        letter-spacing: 0.1em;
        line-height: 1;
        text-transform: uppercase;
      }

      em,
      h1,
      code {
        color: #f5b030;
      }

      em {
        font-style: normal;
      }

      .sub,
      label {
        color: #7a8a7a;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 11px;
      }

      h1 {
        font-size: 16px;
        margin: 16px 0 8px;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 700;
      }

      input,
      button {
        width: 100%;
        border-radius: 7px;
        font-size: 16px;
      }

      input {
        padding: 11px;
        background: #1a1e1a;
        border: 1px solid #3d443d;
        color: #f0f4f0;
      }

      button {
        margin-top: 10px;
        padding: 12px;
        border: 0;
        background: #f5b030;
        color: #0c0e0d;
        font-weight: 800;
      }

      .secondary {
        background: #232923;
        color: #f0f4f0;
        border: 1px solid #3d443d;
      }

      .networks {
        display: grid;
        gap: 8px;
        margin: 8px 0;
      }

      .net {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid #2c312c;
        border-radius: 8px;
        background: #191d19;
        color: #f0f4f0;
        text-align: left;
      }

      .net strong {
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .net span {
        flex: 0 0 auto;
        color: #9bad9b;
        font-size: 12px;
      }

      .status {
        padding: 12px;
        border-radius: 8px;
        background: #101310;
        border: 1px solid #2c312c;
        color: #b8c4b8;
      }

      .status.ok {
        border-color: #3c6f42;
        color: #c8f2ce;
      }

      .status.bad {
        border-color: #7c342b;
        color: #ffbeb5;
      }

      .small {
        font-size: 13px;
        color: #7a8a7a;
      }

      .note {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #2c312c;
        font-size: 13px;
        color: #7a8a7a;
        line-height: 1.4;
      }

      code {
        font-size: 12px;
        word-break: break-all;
      }

      @media (max-width: 480px) {
        body {
          padding: 8px;
        }

        .card {
          margin: 4px auto;
          padding: 14px;
        }

        .brand {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body onload="initSetupPortal()">
    <div class="card">
      <div class="logo">
        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
          <path
            d="M456-600h320q-27-69-82.5-118.5T566-788L456-600Zm-92 80 160-276q-11-2-22-3t-22-1q-66 0-123 25t-101 67l108 188ZM170-400h218L228-676q-32 41-50 90.5T160-480q0 21 2.5 40.5T170-400Zm224 228 108-188H184q27 69 82.5 118.5T394-172Zm86 12q66 0 123-25t101-67L596-440 436-164q11 2 21.5 3t22.5 1Zm252-124q32-41 50-90.5T800-480q0-21-2.5-40.5T790-560H572l160 276ZM480-480Zm0 400q-82 0-155-31.5t-127.5-86Q143-252 111.5-325T80-480q0-83 31.5-155.5t86-127Q252-817 325-848.5T480-880q83 0 155.5 31.5t127 86q54.5 54.5 86 127T880-480q0 82-31.5 155t-86 127.5q-54.5 54.5-127 86T480-80Z"
          ></path>
        </svg>
        <div>
          <div class="brand">OPEN<em>CURTAIN</em>LAB</div>
          <div class="sub">Wi-Fi Setup</div>
        </div>
      </div>

      <div id="status" class="status">Loading status...</div>

      <h1>Connect</h1>
      <label for="networks">Available networks</label>
      <div id="networks" class="networks">
        <div class="small">Scanning...</div>
      </div>
      <button id="scanBtn" class="secondary" type="button" onclick="scanNetworks()">Scan again</button>

      <form id="wifiForm" onsubmit="submitCredentials(event)">
        <label for="ssid">SSID</label>
        <input id="ssid" name="ssid" required autocomplete="off" />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" />

        <label>
          <input id="showPw" type="checkbox" style="width: auto; margin-right: 8px" onchange="togglePassword(this)" />
          Show password
        </label>

        <button id="connectBtn" type="submit">Save network</button>
      </form>

      <p class="note">
        Address after successful connection:
        <code>http://opencurtainlab.local</code>
      </p>
    </div>

    <script>
      // Returns a DOM element by id.
      function byId(id) {
        return document.getElementById(id);
      }

      // Escapes text before it is inserted as HTML.
      function escapeHtml(value) {
        return String(value || "")
          .split("&")
          .join("&amp;")
          .split("<")
          .join("&lt;")
          .split(">")
          .join("&gt;")
          .split('"')
          .join("&quot;")
          .split("'")
          .join("&#39;");
      }

      // Escapes text for safe use inside an HTML attribute.
      function escapeAttr(value) {
        return escapeHtml(value).split("`").join("&#96;");
      }

      // Updates the status panel and visual status class.
      function setStatus(message, type) {
        byId("status").className = "status " + (type || "");
        byId("status").innerHTML = message;
      }

      // Converts RSSI into a compact signal indicator.
      function signalBars(rssi) {
        if (rssi > -55) return "||||";
        if (rssi > -67) return "|||";
        if (rssi > -78) return "||";
        return "|";
      }

      // Renders the current Wi-Fi provisioning status.
      function renderStatus(data) {
        if (!data) {
          setStatus("Status unavailable.", "bad");
          return;
        }

        if (data.lastError || data.error) {
          setStatus("Wrong password or network unreachable.", "bad");
          return;
        }

        if (data.connected) {
          setStatus("Connected to <b>" + escapeHtml(data.currentSsid || data.savedSsid || "Wi-Fi") + "</b><br><code>opencurtainlab.local</code>", "ok");
          return;
        }

        if (data.hasSaved) {
          setStatus("<b>" + escapeHtml(data.savedSsid) + "</b> saved.", "");
          return;
        }

        setStatus("No saved network.", "");
      }

      // Loads the provisioning status from the device.
      async function loadStatus() {
        try {
          const response = await fetch("/wifi/status", { cache: "no-store" });
          renderStatus(await response.json());
        } catch (error) {
          renderStatus(null);
        }
      }

      // Copies the selected network name into the SSID field.
      function selectNetwork(button) {
        byId("ssid").value = button.dataset.ssid || "";
        byId("password").focus();
      }

      // Scans nearby Wi-Fi networks and renders selectable rows.
      async function scanNetworks() {
        const networks = byId("networks");
        networks.innerHTML = '<div class="small">Scanning...</div>';

        try {
          const response = await fetch("/wifi/scan", { cache: "no-store" });
          const data = await response.json();

          if (!data.networks || !data.networks.length) {
            networks.innerHTML = '<div class="small">No networks found.</div>';
            return;
          }

          data.networks.sort(function (a, b) {
            return b.rssi - a.rssi;
          });

          networks.innerHTML = data.networks
            .map(function (network) {
              const ssid = String(network.ssid || "");
              const label = escapeHtml(ssid || "(hidden)");
              const security = network.secure ? " secured" : " open";
              const signal = signalBars(network.rssi) + " " + network.rssi + " dBm" + security;

              return (
                '<button type="button" class="net" data-ssid="' + escapeAttr(ssid) + '" onclick="selectNetwork(this)"><strong>' + label + "</strong><span>" + escapeHtml(signal) + "</span></button>"
              );
            })
            .join("");
        } catch (error) {
          networks.innerHTML = '<div class="small">Scan failed.</div>';
        }
      }

      // Toggles password visibility without changing the input value.
      function togglePassword(checkbox) {
        byId("password").type = checkbox.checked ? "text" : "password";
      }

      // Sends credentials to the device and renders the connection-test result.
      async function submitCredentials(event) {
        event.preventDefault();

        const ssid = byId("ssid");
        const password = byId("password");
        const connectButton = byId("connectBtn");

        connectButton.disabled = true;
        setStatus("Testing <b>" + escapeHtml(ssid.value) + "</b>...", "");

        try {
          const response = await fetch("/wifi", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ssid: ssid.value, password: password.value }),
          });
          const data = await response.json();

          renderStatus(data);
          if (data.connected) {
            setStatus("Connected. The setup AP will close.<br><code>opencurtainlab.local</code>", "ok");
          }
        } catch (error) {
          setStatus("Connection failed. Reconnect to the setup AP and try again.", "bad");
        }

        connectButton.disabled = false;
      }

      // Initializes the setup portal after the document has loaded.
      function initSetupPortal() {
        loadStatus();
        scanNetworks();
      }
    </script>
  </body>
</html>
