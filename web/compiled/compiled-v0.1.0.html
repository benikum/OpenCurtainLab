viation":"Avg deviation","totalOpenTime":"Total open time","flashSync":"Flash sync"},"placeholders":{"measurementNotes":"Notes for this measurementŌĆ”","projectNotes":"Notes for this projectŌĆ”"},"condition":{"notRated":"Not rated","veryGood":"Very good","good":"Good","checkService":"Check service","serviceRecommended":"Service recommended"},"charts":{"notEnoughCurtain":"Not enough sensor points for curtain chart","openingCurtain":"OPENING CURTAIN","closingCurtain":"CLOSING CURTAIN","v1Speed":"Opening speed","v2Speed":"Closing speed","openingSpeed":"Opening speed","closingSpeed":"Closing speed","positionAxis":"POSITION (mm)","speedAxis":"SPEED (m/s)","targetSpeedAxis":"Target speed (1/x s)","noCurtainMeasurements":"No measurements with curtain speed data yet","timeRelative":"TIME (ms, relative to first opening)"},"flash":{"within":"Flash within total opening","outside":"Flash outside total opening","none":"No flash detected"},"project":{"distributionTitle":"Distribution of repeated measurements","overallRating":"Camera ŌĆö overall rating","condition":"Condition","measurements":"Measurements","targetSpeedsMeasured":"target speeds measured","avgDeviation":"Avg deviation","absoluteAcrossRuns":"absolute, across all runs","avgScatter":"Avg scatter Žā","repeatability":"repeatability","linearity":"Linearity","fromLocalCurtainSpeeds":"from local curtain speeds","parallelism":"Parallelism","fromSlitWidth":"from slit width at each sensor","curtainsSummary":"Curtains ŌĆö speed summary","openingCurtain":"Opening curtain","closingCurtain":"Closing curtain","zeroMeas":"0 meas.","measShort":"meas.","loadCustomTimes":"Load custom times","series":"Time series","defaultName":"Default project","deleteProject":"Delete project","deleteProjectHelp":"Deletes the project. Its measurements move to the default project.","delete":"DELETE","localSpeedVariation":"local speed variation"},"table":{"target":"Target","avgMeasurement":"Avg measurement","distribution":"Distribution","grade":"Grade","flash":"Flash","curtainSpeed":"Curtain speed"},"csv":{"note":"Note","project":"Project","exported":"Exported"},"settings":{"customTimesHelp":"Comma-separated denominators up to 1/{max}. Leave empty to load the standard times.","save":"SAVE SETTINGS","saving":"SAVING...","saved":"SAVED","unsaved":"Unsaved changes","savingLabel":"Saving..."},"quickStart":{"title":"Quick start","help":"Measurements are received automatically after each shutter test.","steps":["Connect to the device.","Create or select a project.","Set the target time on the device or in the Web UI.","Fire the camera shutter.","Review the measurement."]},"connectionHelp":{"title":"Could not connect to OpenCurtainLab","steps":["Make sure the device is powered on.","Use opencurtainlab.local or the IP shown on the OLED.","Make sure this computer is on the same Wi-Fi network.","If setup mode is active, connect to the OpenCurtainLab Wi-Fi and open 192.168.4.1."]},"measurementHints":{"generic":{"action":"Check the camera setup and repeat the measurement."},"sensor_already_active_at_start":{"title":"Sensor already active","body":"A sensor was already covered when the device tried to arm the measurement.","action":"Open the shutter path, check alignment, then try again."},"flash_without_sensor":{"title":"Flash without sensor coverage","body":"The flash input fired, but no phototransistor detected shutter movement.","action":"Check the flash sync cable, camera mode, and sensor alignment."},"timeout_with_data":{"title":"Measurement timed out","body":"Some sensor data was captured, but the shutter sequence did not finish in time.","action":"Check whether the shutter got stuck or the selected test setup is correct."},"incomplete_sensor_coverage":{"title":"Incomplete sensor coverage","body":"Not all five sensors were covered during this measurement.","action":"Check camera alignment, curtain travel, or whether the shutter slit covers the full sensor array."},"flash_already_active_at_start":{"title":"Flash contact already active","body":"The flash contact was already closed when the device tried to arm the measurement.","action":"Check the flash sync cable and camera contact. The input must be open before release."}},"deviceErrors":{"generic":{"action":"Check the device and reconnect when the problem is fixed."},"network_access_point_failed":{"title":"Setup access point failed","body":"The device could not start its setup Wi-Fi network.","action":"Restart the device. If this persists, reflash the firmware or check the ESP32 board."},"display_init_failed":{"title":"Display initialization failed","body":"The OLED display could not be initialized.","action":"Check the I2C wiring, display address, and power supply."}},"firmware":{"title":"Version mismatch","warning":"Firmware {actual} and Web UI {expected}.x may not match.","action":"Use firmware and a manifest-compatible Web UI release."},"measurement":{"moveToDefault":"Move to default project"},"versions":{"title":"version mismatch","unknown":"unknown","webUiLabel":"WebUI {version}","publishedLabel":"published {version}","firmwareWebUiMismatch":"Firmware {firmware} and Web UI {webui} use different API versions.","webUiOutdated":"This Web UI is outdated. Loaded {webui}, published {cdn}.","cdnMismatch":"The loaded Web UI {webui} and manifest-selected Web UI {cdn} do not match.","deviceCdnMismatch":"Firmware {firmware} and manifest-selected Web UI {cdn} use different API versions.","action":"Use firmware and a manifest-compatible Web UI release.","mismatchTitle":"Version mismatch","updateAvailable":"Update available","updateAvailableWithVersion":"Update available {version}","mismatchAction":"Use firmware and Web UI files from the same release.","updateAction":"Download the current Web UI files from the project release.","deviceLabel":"Device {version}","upToDate":"Software up to date","updateUnknown":"Update unknown"},"html":{"menuButtonLabel":"Menu","connecting":"ConnectingŌĆ”","projects":"Projects","newProject":"New project","projectMeasurements":"Project measurements","webUiVersion":"Web UI v0.1.0","device":"Device","deviceAddress":"Device address","connect":"Connect","measurement":"Measurement","targetSeries":"Target series","customTargetTimes":"Custom target times","sensitivity":"Sensitivity","sensitivityLow":"low","sensitivityMedium":"medium","sensitivityHigh":"high","display":"Display","results":"Results","untilButtonPress":"until button press","oledSleep":"OLED sleep","afterOneMinute":"after 1 min","afterFiveMinutes":"after 5 min","afterTenMinutes":"after 10 min","afterThirtyMinutes":"after 30 min","interpolateCharts":"Interpolate charts","saveSettings":"SAVE SETTINGS","localData":"Local data","exportWorkspaceBackup":"Export","importWorkspaceBackup":"Import","resetLocalWebUiData":"Reset","guide":"Guide","settings":"Settings","connectDeviceTitle":"Connect the device","connectDeviceSubtitle":"Connect OpenCurtainLab to your network.","cameraProjectName":"Camera / project name","cameraProjectNamePlaceholder":"e.g. Leica M3, Canon AE-1 ŌĆ”","measurementMode":"Measurement mode","timeSeries":"Time series","supportedShutterSpeeds":"Supported shutter speeds (1/x s)","cancel":"Cancel","create":"Create","resultDisplayOff":"off","oledSleepOff":"off","batteryWarning":"Low-battery notice","batteryWarningVoltage":"Warn below"},"targetSeries":{"standard":"Standard","custom":"Custom"},"settingsInfo":{"connection":"Connection","connected":"connected","notConnected":"not connected","ip":"IP","hostname":"Hostname","wifi":"Wi-Fi","signal":"Signal","uptime":"Uptime","measurements":"Measurements","status":"Status","ok":"OK","unavailable":"ŌĆö","measurementId":"Measurement ID","problem":"problem","battery":"Battery"},"directions":{"leftRight":"left ŌåÆ right","rightLeft":"right ŌåÆ left","topDown":"top ŌåÆ bottom","bottomTop":"bottom ŌåÆ top"}}}</script><template id=ocl-tutorial-de><article class="manual-page tutorial guide"><section class=hero><div class=eyebrow>OpenCurtainLab Anleitung</div><h1>Benutzung des Testers an Kameras</h1><p>Diese Anleitung beschreibt, wie OpenCurtainLab an Kameras eingesetzt wird: korrekte Positionierung, Wahl der Verschlussrichtung, wiederholbare Messungen und praktische Bewertung der Werte bei der Reparatur.<div><span class=badge>Kameraaufbau</span><span class=badge>Verschlusstest</span><span class=badge>Reparaturbewertung</span><span class=badge>Blitzsynchronisation</span></div></section><section class="card toc"><div class=card-hdr><h2>Inhalt</h2></div><div class="card-body grid"><a href=#prepare>Kamera vorbereiten</a><a href=#connector-safety>Anschl├╝sse sicher verwenden</a><a href=#position>Tester positionieren</a><a href=#modes>Messmodus w├żhlen</a><a href=#run>Messung durchf├╝hren</a><a href=#read>Ergebnis lesen</a><a href=#charts>Diagramme nutzen</a><a href=#repair>Reparatur bewerten</a><a href=#flash>Blitzsynchronisation pr├╝fen</a></div></section><section class=card id=connector-safety><div class=card-hdr><h2>Anschl├╝sse sicher verwenden</h2></div><div class=card-body><div class=warn><strong>Warnung:</strong> Die Lampenbuchse ist kein Audioanschluss. Schlie├¤e keine Kopfh├Črer, Audioger├żte, Mikrofone oder Blitzkabel an die Lampenbuchse an. An der Lampenbuchse k├Čnnen 12 V anliegen. Sie ist ausschlie├¤lich f├╝r die OpenCurtainLab-Lampe vorgesehen.</div><p>Blitzsynchronbuchse und Lampenbuchse haben getrennte Funktionen. Pr├╝fe die Symbole am Geh├żuse, bevor du Kabel anschlie├¤t.</div></section><section class=card id=prepare><div class=card-hdr><h2>Kamera vorbereiten</h2></div><div class=card-body><ol><li>Stelle an der Kamera die Verschlusszeit ein, die gepr├╝ft werden soll.<li>├¢ffne die Kamerar├╝ckwand oder platziere den Tester dort, wo normalerweise Film oder Sensor liegt.<li>Nutze eine gleichm├ż├¤ige, stabile Lichtquelle durch Bajonett, Objektiv├Čffnung oder Front├Čffnung.<li>Stelle sicher, dass vor dem Ausl├Čsen kein Verschlussblatt, Dunkelschieber, Spiegel oder Halter die Sensorreihe verdeckt.<li>L├Čse mechanische Verschl├╝sse vor der eigentlichen Bewertung einige Male aus.</ol><div class=warn>Vermeide flackernde Lampen und PWM-gesteuerte LED-Lichtquellen. Sie k├Čnnen unregelm├ż├¤ige Sensorsignale erzeugen, die wie Verschlussfehler aussehen.</div><div class=ok>Bei Reparaturen sollte jede wichtige Zeit mehrfach gemessen werden. Eine einzelne Ausl├Čsung kann bei alten mechanischen Kameras irref├╝hrend sein.</div></div></section><section class=card id=position><div class=card-hdr><h2>Tester positionieren</h2></div><div class=card-body><p>Platziere die Sensorreihe m├Čglichst nah an der Filmebene. Die Reihe soll so liegen, dass sie zur Laufrichtung des Verschlusses passt.<div class=grid><div class=box><strong>Schlitzverschluss</strong><br>Richte die Sensorreihe entlang der Vorhangbewegung aus. Vor dem Ausl├Čsen sollen alle f├╝nf Sensoren Licht erhalten.</div><div class=box><strong>Zentral- oder Lamellenverschluss</strong><br>Platziere den Tester im Bildfeld und w├żhle den Zentralverschluss-Modus. Ein Vorhanggeschwindigkeitsdiagramm wird hier nicht verwendet.</div><div class=box><strong>Objektivverschluss in einer Kamera</strong><br>├¢ffne die Blende weit genug, damit alle Sensoren Licht bekommen. Wenn die Blende die Reihe abschattet, kann die Messung unvollst├żndig wirken.</div></div></div></section><section class=card id=modes><div class=card-hdr><h2>Messmodus w├żhlen</h2></div><div class=card-body><p>W├żhle nur die Messgeometrie. Die Laufrichtung erkennt die WebUI aus dem Sensor, der zuerst ├Čffnet.<table><tbody><tr><td>Vertikal<td>F├╝r Verschl├╝sse, deren ├¢ffnung ├╝ber die vertikale Sensorachse l├żuft.<tr><td>Horizontal<td>F├╝r Verschl├╝sse, deren ├¢ffnung ├╝ber die horizontale Sensorachse l├żuft.<tr><td>Zentralverschluss<td>F├╝r Lamellenverschl├╝sse und andere Verschl├╝sse, die um die Mitte ├Čffnen statt als Vorh├żnge zu laufen.<div class=note>Die erkannte Richtung wird aus der Reihenfolge der Sensorflanken abgeleitet.</div><section class=card id=run><div class=card-hdr><h2>Messung durchf├╝hren</h2></div><div class=card-body><ol><li>Stelle die Zielzeit am Ger├żt oder in der verbundenen Oberfl├żche ein.<li>Warte, bis das Ger├żt bereit ist.<li>L├Čse den Kameraverschluss normal aus.<li>Wiederhole dieselbe Zeit mehrfach, bevor du eine Reparatur bewertest.<li>Pr├╝fe schnelle, mittlere und langsame Zeiten getrennt, weil sie oft unterschiedliche Fehlerursachen haben.</ol><div class=warn>Wenn ein Sensor schon vor dem Ausl├Čsen verdeckt ist, kann das Ger├żt keine saubere Messung starten. Pr├╝fe Ausrichtung und Beleuchtung der Sensorreihe.</div></div></section><section class=card id=read><div class=card-hdr><h2>Ergebnis lesen</h2></div><div class=card-body><table><tbody><tr><td>Gemessene Zeit<td>Die wirksame Belichtungszeit aus den Sensorzeiten.<tr><td>Abweichung EV<td>Abweichung zur eingestellten Zielzeit in Blendenstufen. Positive Werte bedeuten l├żngere, negative Werte k├╝rzere Belichtung.<tr><td>Streuung<td>Unterschied zwischen den Sensoren. Kleine Streuung bedeutet gleichm├ż├¤ige Belichtung. Gro├¤e Streuung weist auf Capping, ungleiche Schlitzbreite oder ungleichm├ż├¤igen Vorhanglauf hin.<tr><td>Totale ├¢ffnungsdauer<td>Zeit zwischen dem ersten ├¢ffnen und dem letzten Schlie├¤en des Bildfensters. Das ist besonders f├╝r Blitzsynchronisation hilfreich.<tr><td>Messhinweis<td>Hinweis zur Ausl├Čsung, zum Beispiel unvollst├żndige Sensorabdeckung oder Timeout. Das ist Diagnoseinformation und nicht automatisch ein Ger├żtefehler.<div class=note>Eine Kamera kann konstant danebenliegen und trotzdem gut wiederholen. Das deutet eher auf Justage hin. Zuf├żllige Schwankungen deuten eher auf Reibung, klebende Teile, schwache Federn oder ein instabiles Hemmwerk hin.</div><section class=card id=charts><div class=card-hdr><h2>Diagramme nutzen</h2></div><div class=card-body><p>Der Zeitstrahl zeigt, wann jeder Sensor ge├Čffnet und geschlossen wurde. Damit erkennt man Capping oder unvollst├żndige Abl├żufe sehr schnell.<p>Das V(x)-Diagramm zeigt die lokale Vorhanggeschwindigkeit ├╝ber der Sensorposition. Die Messpunkte werden zwischen benachbarten Sensoren berechnet. Eine gegl├żttete Linie kann das Lesen erleichtern, aber die Messpunkte sind die ma├¤geblichen Werte.<div class=grid><div class=box><strong>Ruhige Linie</strong><br>Der Vorhang l├żuft gleichm├ż├¤ig ├╝ber das Bildfeld.</div><div class=box><strong>Steigender oder fallender Verlauf</strong><br>Der Vorhang beschleunigt oder bremst w├żhrend des Laufs.</div><div class=box><strong>Starker Unterschied zwischen ├¢ffnen und Schlie├¤en</strong><br>Die Schlitzbreite ├żndert sich ├╝ber das Bildfeld und kann zu ungleichm├ż├¤iger Belichtung f├╝hren.</div></div></div></section><section class=card id=repair><div class=card-hdr><h2>Reparatur bewerten</h2></div><div class=card-body><table><tbody><tr><td>Alle Zeiten zu langsam oder zu schnell<td>Allgemeine Spannung, Zeitjustage oder Verschlussregulierung pr├╝fen.<tr><td>Schnelle Zeiten ungleichm├ż├¤ig<td>Vorhangspannung, Bremse, Schlitzbreite und Parallelit├żt der Vorh├żnge pr├╝fen.<tr><td>Langsame Zeiten unregelm├ż├¤ig<td>Hemmwerk, alte Schmierung und Verz├Čgerungsmechanik pr├╝fen.<tr><td>Nur ein Teil der Sensorreihe wird belichtet<td>Auf Capping, R├╝ckschlag, blockierten Lauf oder falsche Positionierung des Testers pr├╝fen.<tr><td>Werte ├żndern sich nach mehreren Ausl├Čsungen<td>Alte Schmierung, klebende Lager oder schwache Federn k├Čnnen sich kurzzeitig l├Čsen oder erw├żrmen.<div class=ok>Nach einer Justage sind mehrere Wiederholungen bei derselben Zeit wichtiger als eine einzelne perfekte Ausl├Čsung.</div><section class=card id=flash><div class=card-hdr><h2>Blitzsynchronisation pr├╝fen</h2></div><div class=card-body><ol><li>Verbinde den Blitzsynchronkontakt der Kamera mit dem Tester.<li>Nutze die X-Synchronisation oder die vom Servicemanual empfohlene Zeit.<li>F├╝hre eine Messung durch und pr├╝fe, ob das Blitzsignal w├żhrend der vollst├żndigen ├¢ffnung des Bildfensters liegt.</ol><div class=warn>Liegt das Blitzsignal au├¤erhalb der totalen ├¢ffnungszeit, kann der Synchronkontakt zu fr├╝h, zu sp├żt, verschmutzt oder mechanisch verstellt sein.</div><div class=warn>Stecke das Blitzsynchronkabel nicht in die Lampenbuchse. Die Lampenbuchse ist ein 12-V-Lampenausgang und kein Audio- oder Blitzanschluss.</div><p class=small>Bei Schlitzverschl├╝ssen sollte Blitzsynchronisation bei oder unterhalb der angegebenen Synchronzeit gepr├╝ft werden. Schnellere Zeiten belichten das Bild oft nur als wandernden Schlitz.</div></section><section class=card><div class=card-hdr><h2>Test abschlie├¤en</h2></div><div class=card-body><p>Exportiere nach dem Test die CSV-Datei und lege sie zu den Reparaturnotizen. Sie dokumentiert gemessene Zeiten, Abweichungen, Streuung, Blitzpr├╝fung und Bemerkungen f├╝r sp├żtere Vergleiche.</div></section> <template id=ocl-tutorial-en><article class="manual-page tutorial guide"><section class=hero><div class=eyebrow>OpenCurtainLab Guide</div><h1>Using the tester on cameras</h1><p>This guide explains how to place OpenCurtainLab in or near the film plane, how to choose the correct measurement mode, how to run repeatable tests, and how to interpret the results when servicing cameras.<div><span class=badge>camera setup</span><span class=badge>shutter testing</span><span class=badge>repair assessment</span><span class=badge>flash sync</span></div></section><section class="card toc"><div class=card-hdr><h2>Contents</h2></div><div class="card-body grid"><a href=#prepare>Prepare the camera</a><a href=#connector-safety>Connector safety</a><a href=#position>Place the tester</a><a href=#modes>Choose the mode</a><a href=#run>Run a test</a><a href=#read>Read the result</a><a href=#charts>Use the charts</a><a href=#repair>Assess repairs</a><a href=#flash>Check flash sync</a></div></section><section class=card id=connector-safety><div class=card-hdr><h2>Connector safety</h2></div><div class=card-body><div class=warn><strong>Warning:</strong> The lamp connector is not an audio connector. Do not connect headphones, audio equipment, microphones, or camera flash cables to the lamp socket. The lamp socket can carry 12 V and is only intended for the OpenCurtainLab lamp.</div><p>The flash-sync connector and the lamp connector are separate functions. Check the symbols on the housing before connecting cables.</div></section><section class=card id=prepare><div class=card-hdr><h2>Prepare the camera</h2></div><div class=card-body><ol><li>Set the camera to the shutter speed you want to test.<li>Open the camera back or place the tester where the film or sensor would normally sit.<li>Use a steady, even light source through the lens mount or front opening.<li>Make sure no shutter blade, dark slide, mirror, or test fixture covers the sensor row before release.<li>For mechanical shutters, fire the camera a few times before recording final values.</ol><div class=warn>Avoid flickering lamps and PWM LED light sources. They can create irregular sensor signals that look like shutter problems.</div><div class=ok>For service work, measure each important speed several times. A single release can be misleading on old mechanical cameras.</div></div></section><section class=card id=position><div class=card-hdr><h2>Place the tester</h2></div><div class=card-body><p>Place the sensor row as close as possible to the film plane. The row should cross the image area in the same direction that the shutter travels.<div class=grid><div class=box><strong>Focal-plane shutter</strong><br>Align the row with the curtain travel. All five sensors should be illuminated before the shutter is released.</div><div class=box><strong>Leaf or central shutter</strong><br>Place the tester in the image area and choose the central shutter mode. Curtain speed charts are not used for central shutters.</div><div class=box><strong>Lens shutter in a camera</strong><br>Keep the aperture open enough that all sensors receive light. If the aperture clips the row, the measurement can look incomplete.</div></div></div></section><section class=card id=modes><div class=card-hdr><h2>Choose the measurement mode</h2></div><div class=card-body><p>Select only the measurement geometry. The WebUI detects the travel direction from the first sensor that opens.<table><tbody><tr><td>Vertical<td>For shutters whose opening travels along the vertical sensor axis.<tr><td>Horizontal<td>For shutters whose opening travels along the horizontal sensor axis.<tr><td>Central shutter<td>Use this for leaf shutters and other shutters that open around the centre instead of travelling as curtains.<div class=note>The detected direction is derived from the order of the sensor edges.</div><section class=card id=run><div class=card-hdr><h2>Run a test</h2></div><div class=card-body><ol><li>Set the target speed on the device or in the connected interface.<li>Wait until the device is ready.<li>Release the camera shutter normally.<li>Repeat the same speed several times before judging a repair.<li>Test fast speeds, medium speeds, and slow speeds separately because they often fail for different reasons.</ol><div class=warn>If a sensor is already covered before release, the device cannot start a clean measurement. Check alignment and make sure light reaches all sensors.</div></div></section><section class=card id=read><div class=card-hdr><h2>Read the result</h2></div><div class=card-body><table><tbody><tr><td>Measured exposure<td>The effective exposure time calculated from the sensor timings.<tr><td>Deviation EV<td>Difference from the selected target speed in stops. Positive values mean the exposure was longer; negative values mean it was shorter.<tr><td>Spread<td>Variation between sensors. A small spread means the frame is exposed evenly. A large spread points to capping, uneven slit width, or uneven curtain travel.<tr><td>Total open time<td>The time between the first part of the frame opening and the last part closing. This is useful for flash sync checks.<tr><td>Measurement hint<td>A warning about the captured release, for example incomplete sensor coverage or a timeout. Treat it as diagnostic information, not automatically as a device fault.<div class=note>A camera can be consistently off but repeatable. That usually means adjustment is needed. Random variation usually means friction, sticking parts, weak springs, or an unstable slow-speed mechanism.</div><section class=card id=charts><div class=card-hdr><h2>Use the charts</h2></div><div class=card-body><p>The timeline shows when each sensor opened and closed. It is the fastest way to spot capping or an incomplete run.<p>The V(x) chart shows local curtain speed over the sensor position. The measured points are calculated between neighbouring sensors. The line may be interpolated for easier reading, but the measured points are the important data.<div class=grid><div class=box><strong>Smooth line</strong><br>The curtain moves evenly across the frame.</div><div class=box><strong>Rising or falling trend</strong><br>The curtain speeds up or slows down during travel.</div><div class=box><strong>Strong opening/closing difference</strong><br>The slit width changes across the frame, which can create uneven exposure.</div></div></div></section><section class=card id=repair><div class=card-hdr><h2>Assess repairs</h2></div><div class=card-body><table><tbody><tr><td>All speeds too slow or too fast<td>Check general tension, timing adjustment, or shutter regulation.<tr><td>Fast speeds uneven<td>Check curtain tension, brake action, slit width, and curtain parallelism.<tr><td>Slow speeds irregular<td>Inspect the slow-speed escapement, old lubricant, and delayed release mechanisms.<tr><td>Only part of the sensor row is exposed<td>Look for capping, shutter bounce, blocked travel, or incorrect tester placement.<tr><td>Results change after repeated releases<td>Old lubrication, sticky bearings, or weak springs may be warming up or freeing temporarily.<div class=ok>After adjustment, compare several repeated measurements at the same speed. Repeatability is often more important than one perfect release.</div><section class=card id=flash><div class=card-hdr><h2>Check flash sync</h2></div><div class=card-body><ol><li>Connect the camera flash sync contact to the tester.<li>Use the camera's X-sync setting or the speed recommended by the service manual.<li>Run a measurement and check whether the flash event happens while the frame is fully open.</ol><div class=warn>If the flash event is outside the total opening time, the sync contact may be early, late, dirty, or mechanically misadjusted.</div><div class=warn>Do not plug the flash-sync cable into the lamp socket. The lamp socket is a 12 V lamp output and is not an audio or flash-sync connector.</div><p class=small>For focal-plane shutters, flash sync should be assessed at or below the camera's specified sync speed. Faster speeds often expose the frame as a travelling slit.</div></section><section class=card><div class=card-hdr><h2>Finish the test</h2></div><div class=card-body><p>After the camera has been tested, export the CSV file and keep it with the repair notes. It documents the measured speeds, deviations, spread, flash result, and remarks for later comparison.</div></section> <script>function readJsonScript(id){let el=document.getElementById(id);if(!el)return null;try{return JSON.parse(el.textContent||`{}`)}catch{return null}}function normLang(lang){return String(lang||``).toLowerCase().slice(0,2)===`de`?`de`:`en`}function safeLocalStorageGet(key){try{return localStorage.getItem(key)}catch{return null}}function safeLocalStorageSet(key,value){try{localStorage.setItem(key,value)}catch{}}function sourceConfig(){return Object.assign({i18nDir:`i18n`,tutorialDir:`tutorial`},readJsonScript(`ocl-source-config`)||{})}let OCL_I18N_ALL=readJsonScript(`ocl-i18n-all`)||null;function requestedLanguageFromUrl(){try{let raw=new URLSearchParams(window.location.search||``).get(`lang`);if(!raw)return null;let lang=normLang(raw);return lang===`de`||lang===`en`?lang:null}catch{return null}}function
